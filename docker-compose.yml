services:
  cognee-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: cognee-mcp-fastembed
    container_name: cognee-mcp
    restart: unless-stopped
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TRANSPORT_MODE: "http"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
      TOKENIZERS_PARALLELISM: "false"
      LLM_API_KEY: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6IlQtM1pza2RJUUVoeWtTLWdSMWZKSmZsU3Q4cyJ9..RVHLwo0cfMq32vceQ3RU1El-kksdhx7BCxPSrHQiJP4SsmjJ3wO2ifKwqrkAdYgwdmk46D5C5ZRUgjuBaztJ5B3TblEdIa_bedcV-Pu7DDYqYq0o0qlYXKT0uT_o7K2Xhbp6wp8cMhN2jrPcQKtR7VTZufI_M_c1rK3RJGxZmX6IMEcQSsb4scEK4Jl7HoOymFoWF7xvxesBeQwPjUR-sthMoGynlY8xQUgvvXcjYya1EDE9oKtvWvfPdV-n4X5_JFAWxaWJgXJWL_21vGogHoDsXapx6BaAQUGsdP1ex8OlLpbf9O29vDxRPIAbJfGD9A1i49X_ICKewRXEz2EQRw"
      LLM_PROVIDER: "anthropic"
      LLM_MODEL: "claude-sonnet-4-6"
      LLM_ENDPOINT: "https://gateway.truefoundry.ai"
      EMBEDDING_PROVIDER: "fastembed"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      EMBEDDING_DIMENSIONS: "384"
    volumes:
      - cognee_data:/app/.venv/lib/python3.12/site-packages/cognee/.cognee_system
    networks:
      - cognee_internal
      - n8n_n8n_network
    labels:
      caddy: cognee.maarin.dedyn.io
      caddy.reverse_proxy: "{{upstreams 8000}}"
      caddy.reverse_proxy.header_up: "Host localhost:8000"
      caddy.reverse_proxy.flush_interval: "-1"

volumes:
  cognee_data:

networks:
  cognee_internal:
    driver: bridge
  n8n_n8n_network:
    external: true
